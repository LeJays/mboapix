<!--?xml version="1.0" encoding="UTF-8"?-->
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f2f2f2"></rect>

  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b5d3b"></stop>
      <stop offset="100%" stop-color="#1f7a4d"></stop>
    </linearGradient>

    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7a00"></stop>
      <stop offset="100%" stop-color="#f25c05"></stop>
    </linearGradient>
  </defs>

  <!-- Circular Aperture Symbol -->
  <g transform="translate(400,200)">
    <!-- 6 segments -->
    <g fill="url(#greenGrad)">
      <path d="M0,-140 A140,140 0 0,1 121,-70 L45,-40 A60,60 0 0,0 0,-60 Z"></path>
      <path d="M-121,-70 A140,140 0 0,1 0,-140 L0,-60 A60,60 0 0,0 -45,-40 Z"></path>
      <path d="M-121,70 A140,140 0 0,1 -121,-70 L-45,-40 A60,60 0 0,0 -60,0 Z"></path>
    </g>
    <g fill="url(#orangeGrad)">
      <path d="M0,140 A140,140 0 0,1 -121,70 L-60,0 A60,60 0 0,0 0,60 Z"></path>
      <path d="M121,70 A140,140 0 0,1 0,140 L0,60 A60,60 0 0,0 60,0 Z"></path>
      <path d="M121,-70 A140,140 0 0,1 121,70 L60,0 A60,60 0 0,0 45,-40 Z"></path>
    </g>
  </g>

  <!-- Text -->
  <text x="400" y="450" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="110" font-weight="700">
    <tspan fill="#0b5d3b">Mboa</tspan><tspan fill="#ff6a00">Pix</tspan>
  </text>

</svg>